<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
        }
        .robotic-glow {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8), 0 0 20px rgba(34, 197, 94, 0.6), 0 0 30px rgba(34, 197, 94, 0.4);
        }
        .robotic-border-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5), inset 0 0 15px rgba(34, 197, 94, 0.1);
        }
        .robotic-input-glow:focus {
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6), 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .bg-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{ url_for('static', filename='image.jpg') }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px);
            z-index: -1;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-image-container"></div>
    <div class="bg-overlay"></div>

    <div class="bg-black/80 rounded-2xl border-2 border-green-500 robotic-border-glow max-w-md w-full p-8 backdrop-blur-sm relative z-10">
        <h1 class="text-2xl font-semibold text-green-400 mb-2 robotic-glow">Iris Flower Predictor</h1>
        <p class="text-sm text-green-300 mb-6 robotic-glow">Provide the measurements below to classify the flower species.</p>

        <form id="predictionForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-green-400 uppercase tracking-wider mb-1 robotic-glow">Sepal Length (cm)</label>
                <input type="number" step="0.1" name="sepal_length" required class="w-full px-4 py-2.5 rounded-lg border-2 border-green-600 bg-black/50 text-green-300 text-sm focus:outline-none focus:border-green-400 robotic-input-glow transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-green-400 uppercase tracking-wider mb-1 robotic-glow">Sepal Width (cm)</label>
                <input type="number" step="0.1" name="sepal_width" required class="w-full px-4 py-2.5 rounded-lg border-2 border-green-600 bg-black/50 text-green-300 text-sm focus:outline-none focus:border-green-400 robotic-input-glow transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-green-400 uppercase tracking-wider mb-1 robotic-glow">Petal Length (cm)</label>
                <input type="number" step="0.1" name="petal_length" required class="w-full px-4 py-2.5 rounded-lg border-2 border-green-600 bg-black/50 text-green-300 text-sm focus:outline-none focus:border-green-400 robotic-input-glow transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-green-400 uppercase tracking-wider mb-1 robotic-glow">Petal Width (cm)</label>
                <input type="number" step="0.1" name="petal_width" required class="w-full px-4 py-2.5 rounded-lg border-2 border-green-600 bg-black/50 text-green-300 text-sm focus:outline-none focus:border-green-400 robotic-input-glow transition">
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-green-100 font-medium py-3 px-4 rounded-lg text-sm transition shadow-lg mt-2 robotic-border-glow hover:shadow-green-500/50">
                Classify Flower
            </button>
        </form>

        <div id="resultBox" class="hidden mt-6 p-4 rounded-xl border-2 border-green-500 text-center transition robotic-border-glow bg-black/50">
            <p id="resultText" class="text-base font-medium robotic-glow"></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            
            // Collect form input parameters
            const formData = new FormData(e.target);
            const payload = {
                sepal_length: parseFloat(formData.get('sepal_length')),
                sepal_width: parseFloat(formData.get('sepal_width')),
                petal_length: parseFloat(formData.get('petal_length')),
                petal_width: parseFloat(formData.get('petal_width'))
            };

            try {
                // Post directly back to our Flask endpoint relatively
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                resultBox.classList.remove('hidden', 'bg-red-50', 'border-red-100', 'bg-emerald-50', 'border-emerald-100', 'border-green-500');
                
                if (response.ok) {
                    resultBox.classList.add('border-green-500', 'bg-black/50');
                    resultText.className = "text-green-400 font-semibold text-lg robotic-glow";
                    resultText.innerText = `Prediction: ${data.class}`;
                } else {
                    throw new Error(data.error || 'Server processing error');
                }
            } catch (err) {
                resultBox.classList.add('border-red-500', 'bg-black/50');
                resultText.className = "text-red-400 font-medium text-sm robotic-glow";
                resultText.innerText = `Error: ${err.message}`;
            }
        });
    </script>
</body>
</html>
